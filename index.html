<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Коммерческое предложение · Бот-квалификатор — EnvisionXAI</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Geist', sans-serif; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(96,165,250,0.15), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 30%, rgba(167,139,250,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 70%, rgba(200,230,54,0.07), transparent 60%),
      #050505;
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font-family: inherit; }
  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -30px); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes typing {
    0%   { transform: translateY(0); opacity: 0.4; }
    30%  { transform: translateY(-3px); opacity: 1; }
    60%  { transform: translateY(0); opacity: 0.4; }
    100% { transform: translateY(0); opacity: 0.4; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0;
    animation: float 14s ease-in-out infinite;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #050505; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
  a { color: inherit; }
  ::selection { background: rgba(200,230,54,0.35); color: #fff; }
</style>
</head>
<body id="top">
<div id="root"></div>

<!-- Ambient blobs -->
<div class="blob" style="top: 8%;  left: -150px; width: 380px; height: 380px; background: rgba(96,165,250,0.18); animation-delay: 0s;"></div>
<div class="blob" style="top: 38%; right: -150px; width: 360px; height: 360px; background: rgba(167,139,250,0.14); animation-delay: 4s;"></div>
<div class="blob" style="bottom: 12%; left: 28%; width: 420px; height: 420px; background: rgba(200,230,54,0.08); animation-delay: 8s;"></div>

<script type="text/babel" data-presets="env,react">
  function KPPage() {
    return (
      <div data-screen-label="01 KP Bot-Qualifier" style={{ position: "relative" }}>
        <KPHero />
        <WhatWeOffer />
        <ProblemBlock />
        <SolutionBlock />
        <ChatShowcase />
        <Capabilities />
